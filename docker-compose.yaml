services:
  web:
    container_name: it-central-management
    image: hieudinh13/it-central-management:latest
    ports:
      - "80:5000"
    environment:
      - FLASK_ENV=production
      - FLASK_APP=app.py
    volumes:
      - appdata:/app/appdata
    networks:
      - icm-network
    restart: unless-stopped
networks:
  icm-network:
    driver: bridge
volumes:
  appdata:
    driver: local