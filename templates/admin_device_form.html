{% extends "admin_layout.html" %}

{% block header_title %}{{ 'Cập nhật' if device else 'Thêm Mới' }} Thiết bị{% endblock %}

{% block content %}
<div class="mb-6">
    <a href="{{ url_for('admin_devices') }}"
        class="text-sm text-indigo-600 hover:text-indigo-800 font-medium flex items-center gap-1">
        &larr; Quay lại danh sách
    </a>
</div>

<div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden max-w-3xl">
    <div class="px-6 py-4 border-b border-slate-100 bg-slate-50">
        <h3 class="font-bold text-slate-800">{{ 'Chỉnh sửa thông tin thiết bị' if device else 'Nhập thông tin thiết bị
            mới' }}</h3>
    </div>
    <form method="POST" class="p-6">

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
            <!-- Cột 1 -->
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Serial Number <span
                            class="text-red-500">*</span></label>
                    <input type="text" name="serial_number" value="{{ device.serial_number if device else '' }}"
                        required
                        class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Thương hiệu (Brand) <span
                            class="text-red-500">*</span></label>
                    <!-- <input type="text" name="brandname" value="{{ device.brandname if device else '' }}" required placeholder="VD: Dell, Apple..."
                           class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"> -->
                    <select name="brandname"
                        class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 bg-white">
                        <option value="LG" {% if brandname and device.brandname=='LG' %}selected{% endif %}>LG</option>
                        <option value="Apple" {% if brandname and device.brandname=='Apple' %}selected{% endif %}>Apple
                        </option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Model <span
                            class="text-red-500">*</span></label>
                    <select name="model" required
                        class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 bg-white">
                        <option value="14Z90S-G.AH55A5" {% if device and device.model=='14Z90S-G.AH55A5' %}selected{%
                            endif %}>14Z90S-G.AH55A5</option>
                        <option value="14ZD90P-G.AX51A5" {% if device and device.model=='14ZD90P-G.AX51A5' %}selected{%
                            endif %}>14ZD90P-G.AX51A5</option>
                        <option value="14ZD90R-G.AX53A5" {% if device and device.model=='14ZD90R-G.AX53A5' %}selected{%
                            endif %}>14ZD90R-G.AX53A5</option>
                        <option value="16ZD90R-G.AX53A5" {% if device and device.model=='16ZD90R-G.AX53A5' %}selected{%
                            endif %}>16ZD90R-G.AX53A5</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Trạng thái (Status) <span
                            class="text-red-500">*</span></label>
                    <select name="status"
                        class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 bg-white">
                        <option value="Standby" {% if device and device.status=='Standby' %}selected{% endif %}>Standby
                            (Trong kho)</option>
                        <option value="In-Use" {% if device and device.status=='In-Use' %}selected{% endif %}>In-Use
                            (Đang sử dụng)</option>
                        <option value="Reparing" {% if device and device.status=='Reparing' %}selected{% endif %}>
                            Reparing (Đang sửa chữa)</option>
                    </select>
                </div>
            </div>

            <!-- Cột 2 -->
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">CPU <span
                            class="text-red-500">*</span></label>
                    <select name="cpu" required
                        class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 bg-white">
                        <option value="Intel Core i5-1135G7" {% if device and device.cpu=='Intel Core i5-1135G7'
                            %}selected{% endif %}>Intel Core i5-1135G7</option>
                        <option value="Intel Core i5-1340P" {% if device and device.cpu=='Intel Core i5-1340P'
                            %}selected{% endif %}>Intel Core i5-1340P</option>
                        <option value="Intel Core Ultra 5 125H" {% if device and device.cpu=='Intel Core Ultra 5 125H'
                            %}selected{% endif %}>Intel Core Ultra 5 125H</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">RAM</label>
                    <input type="text" name="ram" value="16GB" readonly
                        class="w-full px-3 py-2 border border-slate-200 bg-slate-100 text-slate-500 rounded-lg cursor-not-allowed focus:outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Disk (Ổ cứng) <span
                            class="text-red-500">*</span></label>
                    <select name="disk" required
                        class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 bg-white">
                        <option value="512GB" {% if device and device.disk=='512GB' %}selected{% endif %}>512GB</option>
                        <option value="1TB" {% if device and device.disk=='1TB' %}selected{% endif %}>1TB</option>
                    </select>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Ngày Thuê <span
                                class="text-red-500">*</span></label>
                        <input type="date" name="rent_startdate"
                            value="{{ device.rent_startdate.isoformat() if device and device.rent_startdate else '' }}"
                            class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 inline-block">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Hết Hạn <span
                                class="text-red-500">*</span></label>
                        <input type="date" name="rent_expired"
                            value="{{ device.rent_expired.isoformat() if device and device.rent_expired else '' }}"
                            class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 inline-block">
                    </div>
                </div>
            </div>
        </div>

        <div class="mb-6">
            <label class="block text-sm font-medium text-slate-700 mb-1">Ghi chú (Comment)</label>
            <textarea name="comment" rows="3"
                class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500"></textarea>
        </div>

        <div class="flex justify-end gap-3 pt-4 border-t border-slate-100">
            <a href="{{ url_for('admin_devices') }}"
                class="px-5 py-2 border border-slate-300 rounded-lg text-slate-700 hover:bg-slate-50 transition-colors font-medium">Hủy
                bỏ</a>
            <button type="submit"
                class="px-5 py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg font-medium transition-colors shadow-sm">
                {{ 'Lưu thay đổi' if device else 'Thêm thiết bị' }}
            </button>
        </div>

    </form>
</div>
{% endblock %}
