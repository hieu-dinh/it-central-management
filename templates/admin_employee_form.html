{% extends "admin_layout.html" %}

{% block header_title %}{{ 'Cập nhật' if employee else 'Thêm Mới' }} Nhân sự{% endblock %}

{% block content %}
<div class="mb-6">
    <a href="{{ url_for('admin_employees') }}"
        class="text-sm text-indigo-600 hover:text-indigo-800 font-medium flex items-center gap-1">
        &larr; Quay lại danh sách
    </a>
</div>

<div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden max-w-xl">
    <div class="px-6 py-4 border-b border-slate-100 bg-slate-50">
        <h3 class="font-bold text-slate-800">{{ 'Chỉnh sửa thông tin nhân viên' if employee else 'Nhập thông tin nhân
            viên mới' }}</h3>
    </div>
    <form method="POST" class="p-6">

        <div class="space-y-5 mb-6">
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Họ và Tên <span
                        class="text-red-500">*</span></label>
                <input type="text" name="full_name" value="{{ employee.full_name if employee else '' }}" required
                    placeholder="VD: Nguyễn Văn A"
                    class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
            </div>

            <div class="grid grid-cols-2 gap-5">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Quốc tịch (Mã) <span
                            class="text-red-500">*</span></label>
                    <select name="nationality"
                        class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 bg-white">
                        <option value="vn" {% if employee and employee.nationality=='vn' %}selected{% endif %}>VN - Việt
                            Nam</option>
                        <option value="kr" {% if employee and employee.nationality=='kr' %}selected{% endif %}>KR - Hàn
                            Quốc</option>
                        <option value="in" {% if employee and employee.nationality=='in' %}selected{% endif %}>IN - Ấn
                            Độ</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Phòng ban (Dept) <span
                            class="text-red-500">*</span></label>
                    <select name="dept_id"
                        class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 bg-white">
                        {% for dept in departments %}
                        <option value="{{ dept.id }}" {% if employee and employee.dept_id==dept.id %}selected{% endif
                            %}>
                            {{ dept.name }}
                        </option>
                        {% endfor %}
                    </select>
                </div>
            </div>

        </div>

        <div class="flex justify-end gap-3 pt-4 border-t border-slate-100">
            <a href="{{ url_for('admin_employees') }}"
                class="px-5 py-2 border border-slate-300 rounded-lg text-slate-700 hover:bg-slate-50 transition-colors font-medium">Hủy
                bỏ</a>
            <button type="submit"
                class="px-5 py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg font-medium transition-colors shadow-sm">
                {{ 'Lưu thay đổi' if employee else 'Thêm nhân sư' }}
            </button>
        </div>

    </form>
</div>
{% endblock %}
